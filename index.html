<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Word Reveal Toy Rain</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
      }

      .game {
        max-width: 100vw;
        max-height: 100vh;
        max-height: 100dvh;
        overflow: hidden;
      }

      .stage {
        min-height: 0;
      }

      .version-badge {
        position: absolute;
        top: 2px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 4;
        color: rgba(255, 250, 240, 0.72);
        font-size: 10px;
        font-weight: 800;
        line-height: 1;
        pointer-events: none;
      }

      @media (max-width: 640px) {
        body {
          place-items: stretch;
        }

        .game {
          width: 100vw;
          height: 100vh;
          height: 100dvh;
          min-height: 0;
        }

        .controls {
          grid-template-columns: 1fr 88px;
        }

        #nextButton {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 640px) and (max-height: 600px) {
        .controls {
          grid-template-columns: 1fr 76px;
        }
      }
    </style>
  </head>
  <body>
    <main class="game">
      <section class="stage" aria-live="polite">
        <div class="version-badge" aria-hidden="true">v2026.05.16.1923</div>
        <div class="progress">
          <span id="roundText">1 / 100</span>
          <span id="scoreText">Score 0</span>
        </div>
        <div id="word" class="word">Loading</div>
        <div class="image-wrap">
          <img id="revealImage" alt="" draggable="false" />
        </div>
        <canvas id="rain"></canvas>
      </section>

      <section class="controls">
        <button id="revealButton" class="primary">Reveal</button>
        <button id="missButton">IDK</button>
        <button id="nextButton" hidden>Next</button>
      </section>

      <section id="done" class="done" hidden>
        <h1>Final score</h1>
        <p id="finalScore">0 out of 100</p>
        <button id="restartButton">Play again</button>
      </section>
    </main>
    <script src="vendor/matter.min.js"></script>
    <script src="game.js"></script>
  </body>
</html>
